<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tus Series - Seguimiento de Series y Películas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0f0f1a;
            --surface: #1a1a2e;
            --surface2: #16213e;
            --primary: #e94560;
            --text: #eee;
            --text-secondary: #aaa;
            --accent: #0f3460;
            --success: #4caf50;
            --warning: #ff9800;
            --border: #2a2a4a;
            --tv-color: #0f3460;
            --movie-color: #e94560;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 0 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, var(--primary), #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .main-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .main-tab {
            padding: 10px 24px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95rem;
        }

        .main-tab.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        .main-tab:hover {
            border-color: var(--primary);
        }

        .search-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-container input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 12px;
            border: 2px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-container input:focus {
            border-color: var(--primary);
        }

        .search-container button {
            padding: 14px 24px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: opacity 0.3s;
        }

        .search-container button:hover {
            opacity: 0.9;
        }

        .sub-tabs, .my-list-sub-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
            background: var(--surface);
            border-radius: 12px;
            padding: 4px;
        }

        .sub-tab, .my-list-sub-tab {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s;
            text-align: center;
        }

        .sub-tab.active, .my-list-sub-tab.active {
            background: var(--accent);
            color: white;
        }

        .sub-tab.tv-sub.active, .my-list-sub-tab.tv-sub.active {
            background: var(--tv-color);
        }

        .sub-tab.movie-sub.active, .my-list-sub-tab.movie-sub.active {
            background: var(--movie-color);
        }

        .count {
            display: inline-block;
            background: rgba(255,255,255,0.15);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            margin-left: 4px;
        }

        .results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 16px;
        }

        .card {
            background: var(--surface);
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(233, 68, 96, 0.2);
        }

        .card img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            background: var(--surface2);
        }

        .card-body {
            padding: 14px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .card-body h3 {
            margin-bottom: 4px;
            font-size: 1.05rem;
        }

        .type-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-bottom: 6px;
            font-weight: 600;
            width: fit-content;
        }

        .type-badge.tv {
            background: var(--tv-color);
            color: white;
        }

        .type-badge.movie {
            background: var(--movie-color);
            color: white;
        }

        .card-body p {
            color: var(--text-secondary);
            font-size: 0.85rem;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .status-badge {
            display: inline-block;
            margin-left: 6px;
            font-weight: bold;
            font-size: 0.75rem;
        }
        .status-badge.pending { color: var(--warning); }
        .status-badge.watched { color: var(--success); }

        .progress-container {
            margin-top: auto;
            padding-top: 8px;
        }

        .progress-text {
            font-size: 0.75rem;
            color: var(--success);
            font-weight: bold;
            margin-bottom: 4px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--success);
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .tracked-badge {
            color: var(--success);
            font-size: 0.7rem;
            font-weight: bold;
            margin-left: 4px;
        }

        .detail {
            background: var(--surface);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border);
        }

        .back-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: var(--accent);
        }

        .detail-header {
            display: flex;
            gap: 24px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .detail-poster {
            width: 250px;
            border-radius: 12px;
            flex-shrink: 0;
        }

        .detail-info {
            flex: 1;
            min-width: 250px;
        }

        .detail-info h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .detail-info .meta {
            color: var(--text-secondary);
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .detail-info .overview {
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .track-btn, .watched-btn {
            padding: 12px 24px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.95rem;
            transition: all 0.3s;
            margin-bottom: 8px;
        }

        .track-btn.add {
            background: var(--primary);
            color: white;
        }

        .track-btn.remove {
            background: #555;
            color: white;
        }

        .watched-btn {
            background: var(--warning);
            color: white;
        }
        .watched-btn.is-watched {
            background: var(--success);
        }

        .track-btn:hover, .watched-btn:hover {
            opacity: 0.85;
        }

        .seasons-title {
            margin: 20px 0 12px;
            font-size: 1.3rem;
        }

        .season {
            background: var(--surface2);
            border-radius: 10px;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .season-header {
            padding: 14px 18px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            transition: background 0.2s;
        }

        .season-header:hover {
            background: var(--accent);
        }

        .season-arrow {
            transition: transform 0.3s;
            font-size: 0.8rem;
        }

        .season-arrow.open {
            transform: rotate(90deg);
        }

        .season-status {
            display: inline-block;
            margin-left: 8px;
            color: var(--success);
            font-weight: bold;
            font-size: 0.9rem;
            visibility: hidden;
        }

        .season-status.complete {
            visibility: visible;
        }

        .episodes {
            display: none;
            padding: 8px 0;
        }

        .episodes.show {
            display: block;
        }

        .episode {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 18px;
            border-bottom: 1px solid var(--border);
        }

        .episode:hover {
            background: rgba(255,255,255,0.02);
        }

        .episode input[type="checkbox"] {
            margin-top: 3px;
            width: 18px;
            height: 18px;
            accent-color: var(--success);
            cursor: pointer;
        }

        .episode-info {
            flex: 1;
        }

        .episode-info .ep-name {
            font-weight: 500;
            margin-bottom: 2px;
        }

        .episode-info .ep-overview {
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .watched-label {
            color: var(--success);
            font-size: 0.75rem;
            font-weight: bold;
            margin-left: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .spinner {
            border: 3px solid var(--border);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .no-poster {
            width: 100%;
            height: 350px;
            background: var(--surface2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .export-import-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .export-btn, .import-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.2s;
        }

        .export-btn:hover, .import-btn:hover {
            background: var(--accent);
        }

        @media (max-width: 600px) {
            .detail-header {
                flex-direction: column;
            }
            .detail-poster {
                width: 100%;
                max-width: 300px;
                margin: 0 auto;
            }
            .results {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 Tus Series</h1>
            <p>Seguimiento de series y películas</p>
        </header>

        <div class="main-tabs">
            <button class="main-tab active" id="tab-search" onclick="switchMainTab('search')">🔍 Buscar</button>
            <button class="main-tab" id="tab-mylist" onclick="switchMainTab('mylist')">📋 Mi Lista</button>
        </div>

        <div id="main-content"></div>
    </div>

    <script>
        // ============ 🔑 API KEY PÚBLICA DE PRUEBA ============
        const API_KEY = '2dca580c2a14b55200e784d157207b4d';

        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMG_BASE = 'https://image.tmdb.org/t/p/w500';
        const IMG_SMALL = 'https://image.tmdb.org/t/p/w185';

        let currentMainTab = 'search';
        let currentView = 'search';
        let currentDetailId = null;
        let currentDetailType = null;
        let currentSubTab = 'all';
        let currentMyListSubTab = 'all';
        let lastSearchResults = { tv: [], movie: [] };

        // ============ LOCAL STORAGE ============
        function getTrackedShows() {
            return JSON.parse(localStorage.getItem('trackedShows') || '[]');
        }

        function saveTrackedShows(shows) {
            localStorage.setItem('trackedShows', JSON.stringify(shows));
        }

        function isTracked(id) {
            return getTrackedShows().some(s => s.tmdbId === id);
        }

        function getTrackedShow(id) {
            return getTrackedShows().find(s => s.tmdbId === id);
        }

        function toggleTracked(id, title, poster, mediaType, totalEpisodes = null, watched = false) {
            let shows = getTrackedShows();
            const index = shows.findIndex(s => s.tmdbId === id);
            if (index >= 0) {
                shows.splice(index, 1);
            } else {
                shows.push({ tmdbId: id, title, posterPath: poster, mediaType, totalEpisodes, watched });
            }
            saveTrackedShows(shows);
            return index < 0;
        }

        function setMovieWatchedStatus(id, watched) {
            let shows = getTrackedShows();
            const show = shows.find(s => s.tmdbId === id && s.mediaType === 'movie');
            if (show) {
                show.watched = watched;
                saveTrackedShows(shows);
            }
        }

        function getWatchedEpisodes(showId, season) {
            const key = `watched_${showId}_${season}`;
            return JSON.parse(localStorage.getItem(key) || '[]');
        }

        function toggleWatchedEpisode(showId, season, episode) {
            const key = `watched_${showId}_${season}`;
            let watched = getWatchedEpisodes(showId, season);
            const index = watched.indexOf(episode);
            if (index >= 0) {
                watched.splice(index, 1);
            } else {
                watched.push(episode);
            }
            localStorage.setItem(key, JSON.stringify(watched));
            return index < 0;
        }

        function countAllWatchedEpisodes(showId) {
            let totalWatched = 0;
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                const match = key.match(/^watched_(\d+)_(\d+)$/);
                if (match && parseInt(match[1]) === showId) {
                    const episodes = JSON.parse(localStorage.getItem(key) || '[]');
                    totalWatched += episodes.length;
                }
            }
            return totalWatched;
        }

        // ============ API CALLS ============
        async function apiCall(url, retries = 3) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url);
                    if (response.ok) return response.json();
                    
                    if (response.status === 502 && i < retries - 1) {
                        console.log(`Reintentando (${i + 1}/${retries})...`);
                        await new Promise(r => setTimeout(r, 2000 * (i + 1)));
                        continue;
                    }
                    
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.status_message || `Error HTTP ${response.status}`);
                } catch (e) {
                    if (i === retries - 1) throw e;
                    await new Promise(r => setTimeout(r, 1500));
                }
            }
        }

        async function searchMulti(query) {
            const data = await apiCall(
                `${BASE_URL}/search/multi?query=${encodeURIComponent(query)}&include_adult=false&language=es&api_key=${API_KEY}`
            );
            const results = data.results?.filter(r => ['tv', 'movie'].includes(r.media_type)) || [];
            return {
                tv: results.filter(r => r.media_type === 'tv'),
                movie: results.filter(r => r.media_type === 'movie')
            };
        }

        async function getTVShow(id) {
            return apiCall(`${BASE_URL}/tv/${id}?language=es&api_key=${API_KEY}`);
        }

        async function getMovie(id) {
            return apiCall(`${BASE_URL}/movie/${id}?language=es&api_key=${API_KEY}`);
        }

        async function getSeason(tvId, seasonNum) {
            return apiCall(`${BASE_URL}/tv/${tvId}/season/${seasonNum}?language=es&api_key=${API_KEY}`);
        }

        // ============ RENDER ============
        function switchMainTab(tab) {
            currentMainTab = tab;
            currentView = 'search';
            document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            render();
        }

        function render() {
            const content = document.getElementById('main-content');
            if (currentView === 'search') {
                if (currentMainTab === 'search') {
                    renderSearchView(content);
                } else {
                    renderMyListView(content);
                }
            } else if (currentView === 'detail') {
                renderDetail(content);
            }
        }

        function renderSearchView(container) {
            container.innerHTML = `
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Buscar serie o película..." 
                           onkeyup="if(event.key==='Enter')doSearch()" autofocus>
                    <button onclick="doSearch()">Buscar</button>
                </div>
                <div id="results-area">
                    <div class="empty-state">
                        <div style="font-size:4rem;margin-bottom:16px;">🔍</div>
                        <p>Busca tus series y películas favoritas</p>
                    </div>
                </div>
            `;
        }

        async function doSearch() {
            const query = document.getElementById('search-input').value.trim();
            const container = document.getElementById('results-area');
            
            if (!query || query.length < 2) {
                container.innerHTML = '<div class="empty-state"><p>Escribe al menos 2 caracteres para buscar</p></div>';
                return;
            }
            
            container.innerHTML = '<div class="loading"><div class="spinner"></div>Buscando...</div>';
            
            try {
                lastSearchResults = await searchMulti(query);
                currentSubTab = 'all';
                renderResultsWithTabs(container);
            } catch (e) {
                container.innerHTML = `<div class="empty-state" style="color:#e94560;">
                    <div style="font-size:4rem;">❌</div>
                    <p>Error: ${e.message}</p>
                </div>`;
            }
        }

        function renderResultsWithTabs(container) {
            const total = lastSearchResults.tv.length + lastSearchResults.movie.length;
            
            if (total === 0) {
                container.innerHTML = '<div class="empty-state"><div style="font-size:4rem;">😕</div><p>No se encontraron resultados</p></div>';
                return;
            }

            container.innerHTML = `
                <div class="sub-tabs">
                    <button class="sub-tab ${currentSubTab === 'all' ? 'active' : ''}" onclick="switchSubTab('all')">
                        📺 Todo <span class="count">${total}</span>
                    </button>
                    <button class="sub-tab tv-sub ${currentSubTab === 'tv' ? 'active' : ''}" onclick="switchSubTab('tv')">
                        Series <span class="count">${lastSearchResults.tv.length}</span>
                    </button>
                    <button class="sub-tab movie-sub ${currentSubTab === 'movie' ? 'active' : ''}" onclick="switchSubTab('movie')">
                        🎬 Películas <span class="count">${lastSearchResults.movie.length}</span>
                    </button>
                </div>
                <div class="results" id="results-grid"></div>
            `;

            renderCurrentResults();
        }

        function switchSubTab(subTab) {
            currentSubTab = subTab;
            const container = document.getElementById('results-area');
            container.querySelectorAll('.sub-tab').forEach(btn => {
                btn.classList.remove('active');
                if ((subTab === 'tv' && btn.classList.contains('tv-sub')) ||
                    (subTab === 'movie' && btn.classList.contains('movie-sub')) ||
                    (subTab === 'all' && !btn.classList.contains('tv-sub') && !btn.classList.contains('movie-sub'))) {
                    btn.classList.add('active');
                }
            });
            renderCurrentResults();
        }

        function renderCurrentResults() {
            const grid = document.getElementById('results-grid');
            if (!grid) return;

            let items = [];
            if (currentSubTab === 'all') {
                items = [...lastSearchResults.tv, ...lastSearchResults.movie];
            } else if (currentSubTab === 'tv') {
                items = lastSearchResults.tv;
            } else {
                items = lastSearchResults.movie;
            }

            if (items.length === 0) {
                const type = currentSubTab === 'tv' ? 'series' : currentSubTab === 'movie' ? 'películas' : 'resultados';
                grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><p>No se encontraron ${type}</p></div>`;
                return;
            }

            grid.innerHTML = items.map(r => renderCard(r)).join('');
        }

        function renderCard(item) {
            const title = item.name || item.title || 'Sin título';
            const type = item.media_type === 'tv' ? 'Serie' : 'Película';
            const poster = item.poster_path ? `${IMG_SMALL}${item.poster_path}` : null;
            const overview = item.overview || 'Sin sinopsis disponible.';
            const tracked = isTracked(item.id);
            const year = item.media_type === 'tv' 
                ? (item.first_air_date ? item.first_air_date.substring(0, 4) : '')
                : (item.release_date ? item.release_date.substring(0, 4) : '');
            const rating = item.vote_average ? item.vote_average.toFixed(1) : '';

            let progressHTML = '';
            if (tracked && item.media_type === 'tv') {
                const show = getTrackedShow(item.id);
                if (show && show.totalEpisodes) {
                    const watchedCount = countAllWatchedEpisodes(item.id);
                    const total = show.totalEpisodes;
                    const percentage = total > 0 ? Math.round((watchedCount / total) * 100) : 0;
                    progressHTML = `
                        <div class="progress-container">
                            <div class="progress-text">${watchedCount} de ${total} vistos (${percentage}%)</div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width:${percentage}%"></div>
                            </div>
                        </div>
                    `;
                } else {
                    progressHTML = `<div class="progress-container"><span class="tracked-badge">✓ En seguimiento</span></div>`;
                }
            } else if (tracked && item.media_type === 'movie') {
                const show = getTrackedShow(item.id);
                const isWatched = show ? show.watched : false;
                const statusClass = isWatched ? 'watched' : 'pending';
                const statusText = isWatched ? '✓ Vista' : '🟠 Pendiente';
                progressHTML = `<div class="progress-container"><span class="status-badge ${statusClass}">${statusText}</span></div>`;
            }

            return `
                <div class="card" onclick="showDetail(${item.id}, '${item.media_type}')">
                    ${poster ? `<img src="${poster}" alt="${title}">` : '<div class="no-poster">Sin póster</div>'}
                    <div class="card-body">
                        <span class="type-badge ${item.media_type}">${type}</span>
                        ${year ? `<span style="color:var(--text-secondary);font-size:0.75rem;margin-left:4px;">${year}</span>` : ''}
                        ${rating ? `<span style="color:#ffd700;font-size:0.75rem;margin-left:4px;">⭐ ${rating}</span>` : ''}
                        <h3>${title}</h3>
                        <p>${overview}</p>
                        ${progressHTML}
                    </div>
                </div>
            `;
        }

        function renderMyListView(container) {
            const shows = getTrackedShows();
            let items = [];
            if (currentMyListSubTab === 'all') items = shows;
            else if (currentMyListSubTab === 'tv') items = shows.filter(s => s.mediaType === 'tv');
            else items = shows.filter(s => s.mediaType === 'movie');

            container.innerHTML = `
                <div class="my-list-sub-tabs">
                    <button class="my-list-sub-tab ${currentMyListSubTab === 'all' ? 'active' : ''}" onclick="switchMyListSubTab('all')">
                        📺 Todo <span class="count">${shows.length}</span>
                    </button>
                    <button class="my-list-sub-tab tv-sub ${currentMyListSubTab === 'tv' ? 'active' : ''}" onclick="switchMyListSubTab('tv')">
                        Series <span class="count">${shows.filter(s => s.mediaType === 'tv').length}</span>
                    </button>
                    <button class="my-list-sub-tab movie-sub ${currentMyListSubTab === 'movie' ? 'active' : ''}" onclick="switchMyListSubTab('movie')">
                        🎬 Películas <span class="count">${shows.filter(s => s.mediaType === 'movie').length}</span>
                    </button>
                </div>
                <div id="my-list-results">
                    ${items.length === 0 
                        ? `<div class="empty-state">
                            <div style="font-size:4rem;">📭</div>
                            <p>No tienes ${currentMyListSubTab === 'tv' ? 'series' : currentMyListSubTab === 'movie' ? 'películas' : 'nada'} en seguimiento</p>
                          </div>`
                        : `<div class="results">${items.map(s => {
                            const poster = s.posterPath ? `<img src="${IMG_SMALL}${s.posterPath}" alt="${s.title}">` : '<div class="no-poster">Sin póster</div>';
                            let progressHTML = '';
                            if (s.mediaType === 'tv' && s.totalEpisodes) {
                                const watched = countAllWatchedEpisodes(s.tmdbId);
                                const total = s.totalEpisodes;
                                const pct = total > 0 ? Math.round((watched / total) * 100) : 0;
                                progressHTML = `
                                    <div class="progress-container">
                                        <div class="progress-text">${watched} de ${total} vistos (${pct}%)</div>
                                        <div class="progress-bar">
                                            <div class="progress-fill" style="width:${pct}%"></div>
                                        </div>
                                    </div>
                                `;
                            } else if (s.mediaType === 'movie') {
                                const isWatched = s.watched;
                                const statusClass = isWatched ? 'watched' : 'pending';
                                const statusText = isWatched ? '✓ Vista' : '🟠 Pendiente';
                                progressHTML = `<div class="progress-container"><span class="status-badge ${statusClass}">${statusText}</span></div>`;
                            }
                            return `
                                <div class="card" onclick="showDetail(${s.tmdbId}, '${s.mediaType}')">
                                    ${poster}
                                    <div class="card-body">
                                        <span class="type-badge ${s.mediaType}">${s.mediaType === 'tv' ? 'Serie' : 'Película'}</span>
                                        <h3>${s.title}</h3>
                                        ${progressHTML}
                                    </div>
                                </div>
                            `;
                        }).join('')}</div>`
                    }
                </div>
                <div class="export-import-buttons">
                    <button class="export-btn" onclick="exportData()">💾 Exportar copia de seguridad</button>
                    <button class="import-btn" onclick="document.getElementById('import-file').click()">📂 Importar copia</button>
                    <input type="file" id="import-file" style="display:none;" accept=".json" onchange="importData(this)">
                </div>
            `;
        }

        function switchMyListSubTab(subTab) {
            currentMyListSubTab = subTab;
            const container = document.getElementById('main-content');
            renderMyListView(container);
        }

        function exportData() {
            const data = {
                trackedShows: localStorage.getItem('trackedShows'),
                watchedEpisodes: {}
            };
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('watched_')) {
                    data.watchedEpisodes[key] = localStorage.getItem(key);
                }
            }
            const jsonStr = JSON.stringify(data, null, 2);
            const blob = new Blob([jsonStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'tus-series-backup-' + new Date().toISOString().slice(0,10) + '.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        function importData(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.trackedShows) {
                        localStorage.setItem('trackedShows', data.trackedShows);
                    }
                    if (data.watchedEpisodes) {
                        for (const [key, value] of Object.entries(data.watchedEpisodes)) {
                            localStorage.setItem(key, value);
                        }
                    }
                    alert('✅ Datos importados correctamente. La página se recargará.');
                    location.reload();
                } catch (err) {
                    alert('❌ Error al importar: archivo no válido.');
                }
            };
            reader.readAsText(file);
        }

        // ============ VISTA DETALLE ============
        async function showDetail(id, type) {
            currentView = 'detail';
            currentDetailId = id;
            currentDetailType = type;
            render();
        }

        async function renderDetail(container) {
            container.innerHTML = '<div class="loading"><div class="spinner"></div>Cargando...</div>';
            
            try {
                const data = currentDetailType === 'tv' ? await getTVShow(currentDetailId) : await getMovie(currentDetailId);
                const title = data.name || data.title || 'Sin título';
                const poster = data.poster_path ? `${IMG_BASE}${data.poster_path}` : null;
                const overview = data.overview || 'Sin sinopsis disponible.';
                const tracked = isTracked(currentDetailId);
                let showData = tracked ? getTrackedShow(currentDetailId) : null;

                let extraInfo = '';
                if (currentDetailType === 'tv') {
                    extraInfo = `
                        <p class="meta">📅 Primera emisión: ${data.first_air_date || 'Desconocida'} | ⭐ ${data.vote_average?.toFixed(1) || 'N/A'}</p>
                        <p class="meta">📺 ${data.number_of_seasons} temporada(s) | ${data.number_of_episodes || '?'} episodios</p>
                        ${data.status ? `<p class="meta">📌 Estado: ${data.status}</p>` : ''}
                    `;
                } else {
                    extraInfo = `
                        <p class="meta">📅 Estreno: ${data.release_date || 'Desconocido'} | ⭐ ${data.vote_average?.toFixed(1) || 'N/A'}</p>
                        <p class="meta">⏱️ ${data.runtime || '?'} minutos</p>
                    `;
                }

                let watchedButtonHTML = '';
                if (tracked && currentDetailType === 'movie') {
                    const isWatched = showData ? showData.watched : false;
                    watchedButtonHTML = `
                        <button class="watched-btn ${isWatched ? 'is-watched' : ''}" id="watched-btn" onclick="handleToggleMovieWatched()">
                            ${isWatched ? '✅ Vista' : '🟠 Pendiente'} - Cambiar estado
                        </button>
                    `;
                }

                container.innerHTML = `
                    <button class="back-btn" onclick="goBack()">← Volver</button>
                    <div class="detail">
                        <div class="detail-header">
                            ${poster ? `<img src="${poster}" alt="${title}" class="detail-poster">` : '<div class="no-poster" style="width:250px;height:375px;">Sin póster</div>'}
                            <div class="detail-info">
                                <span class="type-badge ${currentDetailType}">${currentDetailType === 'tv' ? 'Serie' : 'Película'}</span>
                                <h2>${title}</h2>
                                ${extraInfo}
                                <p class="overview">${overview}</p>
                                <button class="track-btn ${tracked ? 'remove' : 'add'}" id="track-btn" onclick="handleTrack()">
                                    ${tracked ? '❌ Quitar de Mi Lista' : '➕ Añadir a Mi Lista'}
                                </button>
                                ${watchedButtonHTML}
                            </div>
                        </div>
                        ${currentDetailType === 'tv' ? `<h3 class="seasons-title">📂 Temporadas</h3><div id="seasons-container"></div>` : ''}
                    </div>
                `;

                if (currentDetailType === 'tv') {
                    await renderSeasons(data.seasons || []);
                }
            } catch (e) {
                container.innerHTML = `
                    <button class="back-btn" onclick="goBack()">← Volver</button>
                    <div class="empty-state" style="color:#e94560;">
                        <div style="font-size:4rem;">❌</div>
                        <p>Error al cargar: ${e.message}</p>
                    </div>
                `;
            }
        }

        async function renderSeasons(seasons) {
            const container = document.getElementById('seasons-container');
            container.innerHTML = '';
            for (const season of seasons) {
                if (season.season_number === 0) continue;
                const seasonDiv = document.createElement('div');
                seasonDiv.className = 'season';
                const watched = getWatchedEpisodes(currentDetailId, season.season_number);
                const totalEpisodes = season.episode_count;
                const complete = watched.length === totalEpisodes && totalEpisodes > 0;
                seasonDiv.innerHTML = `
                    <div class="season-header" onclick="toggleSeason(this, ${currentDetailId}, ${season.season_number})">
                        <span>Temporada ${season.season_number} (${season.episode_count} episodios) 
                            <span class="season-status ${complete ? 'complete' : ''}" id="season-status-${season.season_number}">✔️</span>
                        </span>
                        <span class="season-arrow">▶</span>
                    </div>
                    <div class="episodes" id="episodes-${season.season_number}"></div>
                `;
                container.appendChild(seasonDiv);
            }
        }

        async function toggleSeason(header, tvId, seasonNum) {
            const episodesDiv = document.getElementById(`episodes-${seasonNum}`);
            const arrow = header.querySelector('.season-arrow');
            const isOpening = !episodesDiv.classList.contains('show');

            header.classList.toggle('open', isOpening);
            arrow.classList.toggle('open', isOpening);
            episodesDiv.classList.toggle('show', isOpening);

            if (isOpening && episodesDiv.children.length === 0) {
                episodesDiv.innerHTML = '<div style="padding:20px;text-align:center;color:#aaa;">Cargando episodios...</div>';
                try {
                    const data = await getSeason(tvId, seasonNum);
                    const watched = getWatchedEpisodes(tvId, seasonNum);
                    episodesDiv.innerHTML = (data.episodes || []).map(ep => {
                        const isWatched = watched.includes(ep.episode_number);
                        return `
                            <div class="episode">
                                <input type="checkbox" ${isWatched ? 'checked' : ''} 
                                    onchange="handleEpisodeToggle(${tvId}, ${seasonNum}, ${ep.episode_number}, this.checked)">
                                <div class="episode-info">
                                    <div class="ep-name">${ep.episode_number}. ${ep.name} ${isWatched ? '<span class="watched-label">✓ Visto</span>' : ''}</div>
                                    ${ep.overview ? `<div class="ep-overview">${ep.overview.substring(0, 150)}${ep.overview.length > 150 ? '...' : ''}</div>` : ''}
                                </div>
                            </div>
                        `;
                    }).join('') || '<div style="padding:12px;color:#aaa;">No hay episodios listados</div>';
                } catch (e) {
                    episodesDiv.innerHTML = `<div style="padding:12px;color:#e94560;">Error: ${e.message}</div>`;
                }
            }
        }

        function handleEpisodeToggle(tvId, season, episode, checked) {
            toggleWatchedEpisode(tvId, season, episode);
            const episodeDiv = document.querySelector(`input[onchange*="${tvId}, ${season}, ${episode}"]`)?.closest('.episode');
            const label = episodeDiv?.querySelector('.ep-name');
            if (label) {
                if (checked) {
                    if (!label.querySelector('.watched-label')) {
                        label.innerHTML += ' <span class="watched-label">✓ Visto</span>';
                    }
                } else {
                    const badge = label.querySelector('.watched-label');
                    if (badge) badge.remove();
                }
            }
            updateSeasonStatus(tvId, season);
        }

        function updateSeasonStatus(showId, seasonNum) {
            const statusSpan = document.getElementById(`season-status-${seasonNum}`);
            if (!statusSpan) return;
            const header = document.querySelector(`.season-header[onclick*="${seasonNum}"]`);
            if (!header) return;
            const headerText = header.querySelector('span').textContent;
            const match = headerText.match(/\((\d+)\s*episodios?\)/);
            if (!match) return;
            const total = parseInt(match[1]);
            const watched = getWatchedEpisodes(showId, seasonNum);
            const complete = watched.length === total && total > 0;
            if (complete) {
                statusSpan.classList.add('complete');
            } else {
                statusSpan.classList.remove('complete');
            }
        }

        function handleToggleMovieWatched() {
            const show = getTrackedShow(currentDetailId);
            if (!show) return;
            const newStatus = !show.watched;
            setMovieWatchedStatus(currentDetailId, newStatus);
            // Actualizar botón en UI
            const btn = document.getElementById('watched-btn');
            if (btn) {
                btn.textContent = newStatus ? '✅ Vista - Cambiar a pendiente' : '🟠 Pendiente - Marcar como vista';
                btn.classList.toggle('is-watched', newStatus);
            }
        }

        async function handleTrack() {
            const btn = document.getElementById('track-btn');
            const title = document.querySelector('.detail-info h2')?.textContent || '';
            const posterImg = document.querySelector('.detail-poster');
            let poster = null;
            if (posterImg && posterImg.src && posterImg.src.includes(IMG_BASE)) {
                poster = posterImg.src.replace(IMG_BASE, '');
            }

            const currentlyTracked = isTracked(currentDetailId);
            if (!currentlyTracked) {
                let totalEpisodes = null;
                let watched = false;
                if (currentDetailType === 'tv') {
                    try {
                        const data = await getTVShow(currentDetailId);
                        totalEpisodes = data.number_of_episodes || 0;
                    } catch (e) {}
                } else {
                    // Para películas, se añaden como pendientes por defecto
                    watched = false;
                }
                toggleTracked(currentDetailId, title, poster, currentDetailType, totalEpisodes, watched);
            } else {
                toggleTracked(currentDetailId, title, poster, currentDetailType);
            }

            const added = !currentlyTracked;
            btn.textContent = added ? '❌ Quitar de Mi Lista' : '➕ Añadir a Mi Lista';
            btn.classList.toggle('add', !added);
            btn.classList.toggle('remove', added);

            // Si es película y se acaba de añadir, mostrar/ocultar el botón de estado
            if (currentDetailType === 'movie') {
                // Si se añadió, aparecerá el botón de estado; al quitar, desaparece.
                // Para simplificar, recargamos la vista detalle (podríamos manipular dinámicamente pero recargamos)
                render();
            }
        }

        function goBack() {
            currentView = 'search';
            render();
        }

        // ============ INICIALIZAR ============
        render();
        console.log('✅ App con estado de películas: vista/pendiente.');
    </script>
</body>
</html>
