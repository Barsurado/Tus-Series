<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tus Series - Seguimiento de Series y Películas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0f0f1a;
            --surface: #1a1a2e;
            --surface2: #16213e;
            --primary: #e94560;
            --text: #eee;
            --text-secondary: #aaa;
            --accent: #0f3460;
            --success: #4caf50;
            --border: #2a2a4a;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 0 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, var(--primary), #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .search-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-container input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 12px;
            border: 2px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-container input:focus {
            border-color: var(--primary);
        }

        .search-container button {
            padding: 14px 24px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: opacity 0.3s;
        }

        .search-container button:hover {
            opacity: 0.9;
        }

        .results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 16px;
        }

        .card {
            background: var(--surface);
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid var(--border);
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(233, 68, 96, 0.2);
        }

        .card img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            background: var(--surface2);
        }

        .card-body {
            padding: 14px;
        }

        .card-body h3 {
            margin-bottom: 4px;
            font-size: 1.05rem;
        }

        .type-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-bottom: 6px;
        }

        .type-badge.tv {
            background: #0f3460;
            color: white;
        }

        .type-badge.movie {
            background: #e94560;
            color: white;
        }

        .card-body p {
            color: var(--text-secondary);
            font-size: 0.85rem;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .detail {
            background: var(--surface);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border);
        }

        .back-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: var(--accent);
        }

        .detail-header {
            display: flex;
            gap: 24px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .detail-poster {
            width: 250px;
            border-radius: 12px;
            flex-shrink: 0;
        }

        .detail-info {
            flex: 1;
            min-width: 250px;
        }

        .detail-info h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .detail-info .meta {
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .detail-info .overview {
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .track-btn {
            padding: 12px 24px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .track-btn.add {
            background: var(--primary);
            color: white;
        }

        .track-btn.remove {
            background: #555;
            color: white;
        }

        .track-btn:hover {
            opacity: 0.85;
        }

        .seasons-title {
            margin: 20px 0 12px;
            font-size: 1.3rem;
        }

        .season {
            background: var(--surface2);
            border-radius: 10px;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .season-header {
            padding: 14px 18px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            transition: background 0.2s;
        }

        .season-header:hover {
            background: var(--accent);
        }

        .season-arrow {
            transition: transform 0.3s;
            font-size: 0.8rem;
        }

        .season-arrow.open {
            transform: rotate(90deg);
        }

        .episodes {
            display: none;
            padding: 8px 0;
        }

        .episodes.show {
            display: block;
        }

        .episode {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 18px;
            border-bottom: 1px solid var(--border);
        }

        .episode:hover {
            background: rgba(255,255,255,0.02);
        }

        .episode input[type="checkbox"] {
            margin-top: 3px;
            width: 18px;
            height: 18px;
            accent-color: var(--success);
            cursor: pointer;
        }

        .episode-info {
            flex: 1;
        }

        .episode-info .ep-name {
            font-weight: 500;
            margin-bottom: 2px;
        }

        .episode-info .ep-overview {
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .watched-label {
            color: var(--success);
            font-size: 0.75rem;
            font-weight: bold;
            margin-left: 8px;
        }

        .my-list-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            padding: 10px 24px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        .tab:hover {
            border-color: var(--primary);
        }

        .loading, .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .spinner {
            border: 3px solid var(--border);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .no-poster {
            width: 100%;
            height: 350px;
            background: var(--surface2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .detail-header {
                flex-direction: column;
            }
            .detail-poster {
                width: 100%;
                max-width: 300px;
                margin: 0 auto;
            }
            .results {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 Tus Series</h1>
            <p>Seguimiento de series y películas</p>
        </header>

        <div id="api-warning-container"></div>

        <div class="tabs" id="tabs">
            <button class="tab active" onclick="switchTab('search')">🔍 Buscar</button>
            <button class="tab" onclick="switchTab('mylist')">📋 Mi Lista</button>
        </div>

        <div id="main-content"></div>
    </div>

    <script>
        // ============ 🔑 API KEY PÚBLICA DE PRUEBA ============
        const API_KEY = '2dca580c2a14b55200e784d157207b4d';

        // Verificar si la API Key está configurada
        if (API_KEY === 'TU_API_KEY_AQUI' || API_KEY === '') {
            document.getElementById('api-warning-container').innerHTML = `
                <div style="background:#ff9800;color:#000;padding:14px;border-radius:10px;margin-bottom:16px;font-weight:bold;text-align:center;line-height:1.6;">
                    ⚠️ <strong>API Key no configurada</strong><br>
                    Para que funcione, debes:<br>
                    1. Crear cuenta en <a href="https://www.themoviedb.org/signup" target="_blank">themoviedb.org</a><br>
                    2. Solicitar API Key en <a href="https://www.themoviedb.org/settings/api" target="_blank">Configuración de API</a><br>
                    3. Cambiar <code>TU_API_KEY_AQUÍ</code> en el código por tu clave real
                </div>
            `;
        } else {
            document.getElementById('api-warning-container').innerHTML = '';
        }

        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMG_BASE = 'https://image.tmdb.org/t/p/w500';
        const IMG_SMALL = 'https://image.tmdb.org/t/p/w185';

        let currentTab = 'search';
        let currentView = 'search';
        let currentDetailId = null;
        let currentDetailType = null;

        // ============ LOCAL STORAGE ============
        function getTrackedShows() {
            return JSON.parse(localStorage.getItem('trackedShows') || '[]');
        }

        function saveTrackedShows(shows) {
            localStorage.setItem('trackedShows', JSON.stringify(shows));
        }

        function isTracked(id) {
            return getTrackedShows().some(s => s.tmdbId === id);
        }

        function toggleTracked(id, title, poster, mediaType) {
            let shows = getTrackedShows();
            const index = shows.findIndex(s => s.tmdbId === id);
            if (index >= 0) {
                shows.splice(index, 1);
            } else {
                shows.push({ tmdbId: id, title, posterPath: poster, mediaType });
            }
            saveTrackedShows(shows);
            return index < 0;
        }

        function getWatchedEpisodes(showId, season) {
            const key = `watched_${showId}_${season}`;
            return JSON.parse(localStorage.getItem(key) || '[]');
        }

        function toggleWatchedEpisode(showId, season, episode) {
            const key = `watched_${showId}_${season}`;
            let watched = getWatchedEpisodes(showId, season);
            const index = watched.indexOf(episode);
            if (index >= 0) {
                watched.splice(index, 1);
            } else {
                watched.push(episode);
            }
            localStorage.setItem(key, JSON.stringify(watched));
            return index < 0;
        }

        // ============ API CALLS ============
        async function apiCall(url, retries = 3) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url);
                    if (response.ok) return response.json();
                    
                    if (response.status === 502 && i < retries - 1) {
                        console.log(`Reintentando (${i + 1}/${retries})...`);
                        await new Promise(r => setTimeout(r, 2000 * (i + 1)));
                        continue;
                    }
                    
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.status_message || `Error HTTP ${response.status}`);
                } catch (e) {
                    if (i === retries - 1) throw e;
                    await new Promise(r => setTimeout(r, 1500));
                }
            }
        }

        async function searchMulti(query) {
            const data = await apiCall(
                `${BASE_URL}/search/multi?query=${encodeURIComponent(query)}&include_adult=false&language=es&api_key=${API_KEY}`
            );
            return data.results?.filter(r => ['tv', 'movie'].includes(r.media_type)) || [];
        }

        async function getTVShow(id) {
            return apiCall(`${BASE_URL}/tv/${id}?language=es&api_key=${API_KEY}`);
        }

        async function getMovie(id) {
            return apiCall(`${BASE_URL}/movie/${id}?language=es&api_key=${API_KEY}`);
        }

        async function getSeason(tvId, seasonNum) {
            return apiCall(`${BASE_URL}/tv/${tvId}/season/${seasonNum}?language=es&api_key=${API_KEY}`);
        }

        // ============ RENDER ============
        function switchTab(tab) {
            currentTab = tab;
            currentView = 'search';
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            render();
        }

        function render() {
            const content = document.getElementById('main-content');
            if (currentView === 'search') {
                renderSearch(content);
            } else if (currentView === 'detail') {
                renderDetail(content);
            }
        }

        function renderSearch(container) {
            container.innerHTML = `
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Buscar serie o película..." 
                           onkeyup="if(event.key==='Enter')doSearch()" autofocus>
                    <button onclick="doSearch()">Buscar</button>
                </div>
                <div id="results-container">
                    <div class="empty-state">
                        <div style="font-size:4rem;margin-bottom:16px;">🔍</div>
                        <p>Busca tus series y películas favoritas</p>
                    </div>
                </div>
                ${currentTab === 'mylist' ? `
                    <div class="my-list-section">
                        <h3 style="margin-bottom:16px;">📋 Mi Lista de Seguimiento</h3>
                        <div id="my-list-results"></div>
                    </div>
                ` : ''}
            `;

            if (currentTab === 'mylist') {
                renderMyList();
            }
        }

        async function doSearch() {
            const query = document.getElementById('search-input').value.trim();
            const container = document.getElementById('results-container');
            
            if (!query || query.length < 2) {
                container.innerHTML = '<div class="empty-state"><p>Escribe al menos 2 caracteres para buscar</p></div>';
                return;
            }
            
            container.innerHTML = '<div class="loading"><div class="spinner"></div>Buscando...</div>';
            
            try {
                const results = await searchMulti(query);
                if (results.length === 0) {
                    container.innerHTML = '<div class="empty-state"><div style="font-size:4rem;">😕</div><p>No se encontraron resultados para "' + query + '"</p></div>';
                    return;
                }
                container.innerHTML = `<div class="results">${results.map(r => renderCard(r)).join('')}</div>`;
            } catch (e) {
                container.innerHTML = `<div class="empty-state" style="color:#e94560;">
                    <div style="font-size:4rem;">❌</div>
                    <p>Error: ${e.message}</p>
                    <p style="font-size:0.8rem;margin-top:8px;">Verifica tu conexión o intenta más tarde</p>
                </div>`;
            }
        }

        function renderCard(item) {
            const title = item.name || item.title || 'Sin título';
            const type = item.media_type === 'tv' ? 'Serie' : 'Película';
            const poster = item.poster_path ? `${IMG_SMALL}${item.poster_path}` : null;
            const overview = item.overview || 'Sin sinopsis disponible.';
            const tracked = isTracked(item.id);

            return `
                <div class="card" onclick="showDetail(${item.id}, '${item.media_type}')">
                    ${poster ? `<img src="${poster}" alt="${title}">` : '<div class="no-poster">Sin póster</div>'}
                    <div class="card-body">
                        <span class="type-badge ${item.media_type}">${type}</span>
                        ${tracked ? '<span style="color:#4caf50;font-size:0.75rem;margin-left:4px;">✓ En seguimiento</span>' : ''}
                        <h3>${title}</h3>
                        <p>${overview}</p>
                    </div>
                </div>
            `;
        }

        function renderMyList() {
            const container = document.getElementById('my-list-results');
            const shows = getTrackedShows();
            if (shows.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>No tienes series ni películas en seguimiento</p></div>';
                return;
            }
            container.innerHTML = `<div class="results">${shows.map(s => {
                const poster = s.posterPath ? `<img src="${IMG_SMALL}${s.posterPath}" alt="${s.title}">` : '<div class="no-poster">Sin póster</div>';
                return `
                    <div class="card" onclick="showDetail(${s.tmdbId}, '${s.mediaType}')">
                        ${poster}
                        <div class="card-body">
                            <span class="type-badge ${s.mediaType}">${s.mediaType === 'tv' ? 'Serie' : 'Película'}</span>
                            <h3>${s.title}</h3>
                        </div>
                    </div>
                `;
            }).join('')}</div>`;
        }

        async function showDetail(id, type) {
            currentView = 'detail';
            currentDetailId = id;
            currentDetailType = type;
            render();
        }

        async function renderDetail(container) {
            container.innerHTML = '<div class="loading"><div class="spinner"></div>Cargando...</div>';
            
            try {
                const data = currentDetailType === 'tv' ? await getTVShow(currentDetailId) : await getMovie(currentDetailId);
                const title = data.name || data.title || 'Sin título';
                const poster = data.poster_path ? `${IMG_BASE}${data.poster_path}` : null;
                const overview = data.overview || 'Sin sinopsis disponible.';
                const tracked = isTracked(currentDetailId);

                let extraInfo = '';
                if (currentDetailType === 'tv') {
                    extraInfo = `
                        <p class="meta">📅 Primera emisión: ${data.first_air_date || 'Desconocida'} | ⭐ ${data.vote_average?.toFixed(1) || 'N/A'}</p>
                        <p class="meta">📺 ${data.number_of_seasons} temporada(s) | ${data.number_of_episodes || '?'} episodios</p>
                    `;
                } else {
                    extraInfo = `
                        <p class="meta">📅 Estreno: ${data.release_date || 'Desconocido'} | ⭐ ${data.vote_average?.toFixed(1) || 'N/A'}</p>
                        <p class="meta">⏱️ ${data.runtime || '?'} minutos</p>
                    `;
                }

                container.innerHTML = `
                    <button class="back-btn" onclick="goBack()">← Volver</button>
                    <div class="detail">
                        <div class="detail-header">
                            ${poster ? `<img src="${poster}" alt="${title}" class="detail-poster">` : '<div class="no-poster" style="width:250px;height:375px;">Sin póster</div>'}
                            <div class="detail-info">
                                <h2>${title}</h2>
                                ${extraInfo}
                                <p class="overview">${overview}</p>
                                <button class="track-btn ${tracked ? 'remove' : 'add'}" id="track-btn" onclick="handleTrack()">
                                    ${tracked ? '❌ Quitar de Mi Lista' : '➕ Añadir a Mi Lista'}
                                </button>
                            </div>
                        </div>
                        ${currentDetailType === 'tv' ? `<h3 class="seasons-title">📂 Temporadas</h3><div id="seasons-container"></div>` : ''}
                    </div>
                `;

                if (currentDetailType === 'tv') {
                    await renderSeasons(data.seasons || []);
                }
            } catch (e) {
                container.innerHTML = `
                    <button class="back-btn" onclick="goBack()">← Volver</button>
                    <div class="empty-state" style="color:#e94560;">
                        <div style="font-size:4rem;">❌</div>
                        <p>Error al cargar: ${e.message}</p>
                    </div>
                `;
            }
        }

        async function renderSeasons(seasons) {
            const container = document.getElementById('seasons-container');
            for (const season of seasons) {
                if (season.season_number === 0) continue;
                const seasonDiv = document.createElement('div');
                seasonDiv.className = 'season';
                seasonDiv.innerHTML = `
                    <div class="season-header" onclick="toggleSeason(this, ${currentDetailId}, ${season.season_number})">
                        <span>Temporada ${season.season_number} (${season.episode_count} episodios)</span>
                        <span class="season-arrow">▶</span>
                    </div>
                    <div class="episodes" id="episodes-${season.season_number}"></div>
                `;
                container.appendChild(seasonDiv);
            }
        }

        async function toggleSeason(header, tvId, seasonNum) {
            const episodesDiv = document.getElementById(`episodes-${seasonNum}`);
            const arrow = header.querySelector('.season-arrow');
            const isOpening = !episodesDiv.classList.contains('show');

            header.classList.toggle('open', isOpening);
            arrow.classList.toggle('open', isOpening);
            episodesDiv.classList.toggle('show', isOpening);

            if (isOpening && episodesDiv.children.length === 0) {
                episodesDiv.innerHTML = '<div style="padding:20px;text-align:center;color:#aaa;">Cargando episodios...</div>';
                try {
                    const data = await getSeason(tvId, seasonNum);
                    const watched = getWatchedEpisodes(tvId, seasonNum);
                    episodesDiv.innerHTML = (data.episodes || []).map(ep => {
                        const isWatched = watched.includes(ep.episode_number);
                        return `
                            <div class="episode">
                                <input type="checkbox" ${isWatched ? 'checked' : ''} 
                                    onchange="handleEpisodeToggle(${tvId}, ${seasonNum}, ${ep.episode_number}, this.checked)">
                                <div class="episode-info">
                                    <div class="ep-name">${ep.episode_number}. ${ep.name} ${isWatched ? '<span class="watched-label">✓ Visto</span>' : ''}</div>
                                    ${ep.overview ? `<div class="ep-overview">${ep.overview.substring(0, 150)}${ep.overview.length > 150 ? '...' : ''}</div>` : ''}
                                </div>
                            </div>
                        `;
                    }).join('') || '<div style="padding:12px;color:#aaa;">No hay episodios listados</div>';
                } catch (e) {
                    episodesDiv.innerHTML = `<div style="padding:12px;color:#e94560;">Error: ${e.message}</div>`;
                }
            }
        }

        function handleEpisodeToggle(tvId, season, episode, checked) {
            toggleWatchedEpisode(tvId, season, episode);
            const episodeDiv = document.querySelector(`input[onchange*="${tvId}, ${season}, ${episode}"]`)?.closest('.episode');
            const label = episodeDiv?.querySelector('.ep-name');
            if (label) {
                if (checked) {
                    if (!label.querySelector('.watched-label')) {
                        label.innerHTML += ' <span class="watched-label">✓ Visto</span>';
                    }
                } else {
                    const badge = label.querySelector('.watched-label');
                    if (badge) badge.remove();
                }
            }
        }

        function handleTrack() {
            const btn = document.getElementById('track-btn');
            const title = document.querySelector('.detail-info h2')?.textContent || '';
            const posterImg = document.querySelector('.detail-poster');
            let poster = null;
            if (posterImg && posterImg.src && posterImg.src.includes(IMG_BASE)) {
                poster = posterImg.src.replace(IMG_BASE, '');
            }

            const added = toggleTracked(currentDetailId, title, poster, currentDetailType);
            btn.textContent = added ? '❌ Quitar de Mi Lista' : '➕ Añadir a Mi Lista';
            btn.classList.toggle('add', !added);
            btn.classList.toggle('remove', added);
        }

        function goBack() {
            currentView = 'search';
            render();
        }

        // ============ INICIALIZAR ============
        render();
        console.log('✅ App lista. Busca "Breaking Bad" para probar.');
    </script>
</body>
</html>
